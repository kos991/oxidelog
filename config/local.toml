[server]
api_addr = "127.0.0.1:18080"
tcp_addr = "127.0.0.1:1514"
udp_addr = "127.0.0.1:1515"

[data]
root = "data"
duckdb_path = "data/duckdb/oxidelog.duckdb"
spool_dir = "data/spool"
export_dir = "data/export"
parquet_dir = "data/parquet"
frozen_dir = "data/frozen"

[pipeline]
ingress_queue = 100000
batch_size = 10000
flush_interval_ms = 1000

[auth]
api_token = ""

[archive]
enabled = false
interval_seconds = 86400
batch_limit = 100000
parquet_retention_days = 180
frozen_retention_days = 365
