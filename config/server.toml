[server]
api_addr = "0.0.0.0:18080"
tcp_addr = "0.0.0.0:1514"
udp_addr = "0.0.0.0:1515"

[data]
root = "data"
duckdb_path = "data/duckdb/oxidelog.duckdb"
spool_dir = "data/spool"
export_dir = "data/export"
parquet_dir = "data/parquet"
frozen_dir = "data/frozen"

[pipeline]
ingress_queue = 100000
batch_size = 50000
flush_interval_ms = 5000

[auth]
api_token = ""

[archive]
enabled = true
interval_seconds = 86400
batch_limit = 500000
parquet_retention_days = 180
frozen_retention_days = 365

[lifecycle]
enabled = true
hot_limit = 500000
interval_seconds = 86400
drop_parsed_raw = true

[dual_db]
enabled = false
sync_interval_seconds = 300

[storage]
mode = "local"  # "local" | "hybrid"

[storage.clickhouse]
enabled = false
url = "http://localhost:8123"
database = "oxidelog"
hot_data_hours = 1  # DuckDB keeps last N hours, older queries go to ClickHouse
