name: ClickHouse Integration Build

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Initialize ClickHouse
      run: |
        sleep 10
        container=$(docker ps -q -f ancestor=clickhouse/clickhouse-server:24.3-alpine)
        docker exec -i "$container" clickhouse-client --multiquery < scripts/clickhouse-init.sql
        docker exec "$container" clickhouse-client --query "EXISTS TABLE oxidelog.events"

    - name: Run clippy
      run: cargo clippy --workspace --all-targets 2>&1 | tee cargo-clippy.log

    - name: Build workspace
      run: cargo build --workspace --verbose 2>&1 | tee cargo-build.log

    - name: Run tests
      run: cargo test --workspace --verbose 2>&1 | tee cargo-test.log
      env:
        CLICKHOUSE_URL: http://localhost:8123
        CLICKHOUSE_DATABASE: oxidelog

    - name: Upload ClickHouse build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: clickhouse-cargo-logs
        path: cargo-*.log
