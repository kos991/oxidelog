name: ClickHouse Integration Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Initialize ClickHouse
      run: |
        # Wait for ClickHouse to be ready
        sleep 5

        # Create database and tables
        docker run --rm --network host clickhouse/clickhouse-client:24.3-alpine \
          --host localhost --port 9000 \
          --multiquery < scripts/clickhouse-init.sql || true

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    - name: Build workspace
      run: cargo build --workspace --verbose

    - name: Run tests
      run: cargo test --workspace --verbose
      env:
        CLICKHOUSE_URL: http://localhost:8123
        CLICKHOUSE_DATABASE: oxidelog

    - name: Build release
      run: cargo build --workspace --release --verbose

    - name: Verify ClickHouse integration
      run: |
        # Check if ClickHouse tables exist
        docker run --rm --network host clickhouse/clickhouse-client:24.3-alpine \
          --host localhost --port 9000 \
          --query "SHOW TABLES FROM oxidelog"

        # Check table structure
        docker run --rm --network host clickhouse/clickhouse-client:24.3-alpine \
          --host localhost --port 9000 \
          --query "DESCRIBE oxidelog.events"
