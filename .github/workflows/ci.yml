name: CI

on:
  push:
    branches: ["main", "master", "feature/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy
        run: cargo clippy --workspace --all-targets 2>&1 | tee cargo-clippy.log

      - name: Build (debug)
        run: cargo build --workspace 2>&1 | tee cargo-build.log

      - name: Run unit & lib tests
        run: cargo test --workspace --lib --bins 2>&1 | tee cargo-test.log

      - name: Upload cargo logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-cargo-logs
          path: cargo-*.log
